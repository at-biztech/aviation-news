name: Set Hero Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [public/articles.json]

permissions:
  contents: write

jobs:
  set-image:
    runs-on: ubuntu-latest
    # Only run if the commit was from the agent (not from this workflow)
    if: "!contains(github.event.head_commit.message, 'Set hero image')"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set hero image from Unsplash
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node scripts/set-hero-image.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet public/articles.json && exit 0
          git add public/articles.json
          git commit -m "Set hero image for $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
